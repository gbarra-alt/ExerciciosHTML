<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Grade Horária de Aulas do Módulo</title>
</head>
<body>
    
    <!-- MÓDULO 5: HORÁRIOS DAS AULAS (PRECISA DE TABELA SEMÂNTICA) -->
    <div class="bloco-cronograma">
        <h2 class="titulo-seccao">Horários Académicos</h2>
        <table border="1">
           <caption> tabela de horarios para aulas </caption>
          <thead
            <tr>
                <th>Aula</th>
                <th>Horário</th>
            </tr>
          </thead>
            <tr>
                <td>Estruturação Multimídia</td>
                <td>19:00 - 20:30</td>
            </tr>
        </table>
        
        <p>Recursos necessários:</p>
        <!-- Deve ser refatorado para uma lista não ordenada estruturada -->
         <ol>
          <li> Computador com IDE configurada<br>
          <li> Arquivos de legenda (.vtt) prontos
        </ol>
    </div>

    <hr>

    <!-- MÓDULO 6: CONTEÚDO INTEGRADO (ACESSIBILIDADE E SEGURANÇA) -->
    <div class="bloco-video">
        <h2>Apresentação da Disciplina</h2>
        

<video controls width="640" height="360"> 
        
        <source src="apresentacao.mp4" type="video/mp4">
     <track 
        src="legendas-pt.vtt" 
        kind="captions" 
        srclang="pt-BR" 
        label="Português (Brasil)" 
     default>

      <p> Seu navegador não suporta a reprodução de vídeos.
</p>

</video>

     </div>

    <div class="bloco-mapa">
        <h2>Localização do Campus IFF</h2>
        <!-- Falta sandbox de segurança e título descritivo acessível -->
        
        <iframe src="https://mapas.iff.edu.br" 
          title="Vídeo de apresentação do novo software de acessibilidade"
          sandbox="allow-scripts"> 
        </iframe>
    </div>

</body>
</html>
